# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on: [push, pull_request]

# The workflow declares the minimum required permissions.
# This follows the principle of least privilege.
permissions:
  contents: read

# Cancel any in-progress runs for the same branch or PR.
# This is useful since the workflow runs on all branches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true   # Enables module caching for faster runs.

    - name: Set up Docker
      uses: docker/setup-docker-action@v4
      with:
        version: '29.1.3'

    - name: Test
      run: go test -v -race ./...
